name: Publish Extension

on:
  push:
    tags: ['v*']

  workflow_dispatch:

# Cancel pending runs when new commits arrive
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          # Extract the latest section from CHANGELOG.md (between first and second ## headers)
          NOTES=$(awk '/^## \[/{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$NOTES"
            echo 'RELEASE_NOTES_EOF'
          } >> $GITHUB_OUTPUT

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --out "hydra-${{ steps.version.outputs.version }}.vsix"

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
        continue-on-error: false

      - name: Publish to Open VSX
        run: npx ovsx publish "hydra-${{ steps.version.outputs.version }}.vsix" -p ${{ secrets.OVSX_PAT }}
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: hydra-${{ steps.version.outputs.version }}.vsix
          body: ${{ steps.release_notes.outputs.body }}
          generate_release_notes: ${{ steps.release_notes.outputs.body == '' }}
